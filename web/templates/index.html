<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 ELI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <header class="glass sticky top-0 z-50 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="text-3xl">🤖</div>
                    <div>
                        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">ELI Dashboard</h1>
                        <p class="text-sm text-gray-400">Sistema J.A.R.V.I.S.</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="connection-status" class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></div>
                        <span class="text-sm">Conectando...</span>
                    </div>
                    <div class="text-sm text-gray-400"><span id="current-time">--:--</span></div>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><span class="mr-2">⚡</span> Estado</h2>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-400">Estado:</span>
                            <span id="eli-estado" class="px-3 py-1 bg-gray-700 rounded-full text-sm">Inactivo</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-400">Uptime:</span>
                            <span id="eli-uptime" class="font-mono text-green-400">0h 0m</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-400">Comandos:</span>
                            <span id="eli-comandos" class="font-mono text-blue-400">0</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-400">Último:</span>
                            <span id="eli-ultimo" class="font-mono text-sm text-gray-500">-</span>
                        </div>
                    </div>
                </div>
                
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><span class="mr-2">🖥️</span> PCN</h2>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-400">CPU</span>
                                <span id="cpu-percent" class="font-mono">0%</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div id="cpu-bar" class="bg-blue-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-400">RAM</span>
                                <span id="ram-percent" class="font-mono">0%</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div id="ram-bar" class="bg-green-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">
                                <span id="ram-usado">0</span> GB / <span id="ram-total">0</span> GB
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-400">Disco</span>
                                <span id="disco-percent" class="font-mono">0%</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div id="disco-bar" class="bg-purple-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-400">Temp:</span>
                            <span id="temp" class="font-mono text-orange-400">--°C</span>
                        </div>
                    </div>
                </div>
                
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4">📊 Histórico</h2>
                    <canvas id="metricsChart" height="200"></canvas>
                </div>
            </div>
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><span class="mr-2">🎮</span> Control</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Comando:</label>
                            <select id="comando-select" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none">
                                <option value="">Cargando...</option>
                            </select>
                        </div>
                        <button id="ejecutar-btn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all">
                            ▶️ Ejecutar
                        </button>
                        <div id="resultado-container" class="hidden"></div>
                    </div>
                </div>
                
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                        <span><span class="mr-2">📝</span> Historial</span>
                        <button id="limpiar-historial" class="text-sm text-gray-400 hover:text-white">🗑️ Limpiar</button>
                    </h2>
                    <div id="historial-container" class="space-y-2 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-500 py-8">Sin comandos aún</div>
                    </div>
                </div>
                
                <div class="glass rounded-lg p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><span class="mr-2">📚</span> Comandos</h2>
                    <div id="comandos-lista" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="text-center text-gray-500 py-4">Cargando...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
